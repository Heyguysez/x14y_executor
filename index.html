<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xl4y_ Executor</title>
    
    <!-- PWA Manifest (with Xl4y_ name) -->
    <link rel="manifest" href="data:application/manifest+json,{
      &quot;name&quot;:&quot;Xl4y_ Executor&quot;,
      &quot;short_name&quot;:&quot;Xl4y_&quot;,
      &quot;start_url&quot;:&quot;.&quot;,
      &quot;display&quot;:&quot;standalone&quot;,
      &quot;background_color&quot;:&quot;#0a0a0a&quot;,
      &quot;theme_color&quot;:&quot;#00ff9d&quot;,
      &quot;icons&quot;: [
        {&quot;src&quot;:&quot;https://via.placeholder.com/192/00ff9d/111?text=Xl4y&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;},
        {&quot;src&quot;:&quot;https://via.placeholder.com/512/00ff9d/111?text=Xl4y&quot;,&quot;sizes&quot;:&quot;512x512&quot;,&quot;type&quot;:&quot;image/png&quot;,&quot;purpose&quot;:&quot;maskable&quot;}
      ]
    }">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Xl4y_ Executor">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/00ff9d/111?text=Xl4y">

    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 100%);
            color: #00ff9d;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        .header {
            padding: 30px 15px 20px;
            background: rgba(0,0,0,0.7);
            border-bottom: 3px solid #00ff9d;
            text-shadow: 0 0 20px #00ff9d, 0 0 40px #ff00ff;
        }
        h1 {
            font-size: 3.2em;
            margin: 0;
            letter-spacing: 4px;
            color: #00ff9d;
        }
        .subtitle {
            font-size: 1.3em;
            color: #ff00ff;
            margin: 10px 0 0;
        }
        .container { padding: 20px 15px; }
        button {
            width: 90%;
            max-width: 420px;
            padding: 20px;
            font-size: 1.4em;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            margin: 15px auto;
            display: block;
            box-shadow: 0 0 25px #00ff9d;
            transition: all 0.3s;
        }
        .android-btn {
            background: #00ff9d;
            color: #000;
        }
        .ios-btn {
            background: #ff00ff;
            color: white;
            box-shadow: 0 0 25px #ff00ff;
        }
        button:active { transform: scale(0.96); }
        .status {
            margin: 25px 15px;
            padding: 20px;
            background: #111;
            border: 1px solid #00ff9d;
            border-radius: 12px;
            font-size: 1.2em;
        }
        .neon-text {
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #00ff9d; }
            to { text-shadow: 0 0 30px #00ff9d, 0 0 50px #ff00ff; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="neon-text">Xl4y_</h1>
        <p class="subtitle">EXECUTOR</p>
    </div>

    <div class="container">
        <div id="deviceInfo" style="font-size:1.3em; margin:20px 0; padding:15px; background:#111; border-radius:12px;">
            Detecting device...
        </div>

        <div id="androidSection" style="display:none;">
            <button class="android-btn" onclick="startAndroidDownload()">📥 Download Xl4y_ APK</button>
        </div>
        <div id="iosSection" style="display:none;">
            <button class="ios-btn" onclick="startIOSDownload()">📥 Download Xl4y_ IPA</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
        // Device detection and download functions (same as before)
        function detectDevice() {
            const ua = navigator.userAgent.toLowerCase();
            const info = document.getElementById('deviceInfo');
            if (/android/.test(ua)) {
                info.innerHTML = '✅ Android detected';
                document.getElementById('androidSection').style.display = 'block';
            } else if (/iphone|ipad|ipod/.test(ua)) {
                info.innerHTML = '✅ iOS detected';
                document.getElementById('iosSection').style.display = 'block';
            } else {
                info.innerHTML = '📱 Use on mobile for best results';
                document.getElementById('androidSection').style.display = 'block';
                document.getElementById('iosSection').style.display = 'block';
            }
        }

        function startAndroidDownload() {
            document.getElementById('status').innerHTML = '🚀 Downloading Xl4y_ APK...<br>Install and open to use scripts.';
        }

        function startIOSDownload() {
            document.getElementById('status').innerHTML = '📥 Xl4y_ IPA ready!<br>Use eSign/Scarlet → Trust the profile.';
        }

        window.onload = detectDevice;
    </script>
</body>
</html>
